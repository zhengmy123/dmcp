  web:
    image: nginx:alpine
    container_name: mcp-web
    restart: unless-stopped
    ports:
      - "17000:80"
    volumes:
      - ./web/admin/dist:/usr/share/nginx/html:ro
      - ./web/admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mcp-network

volumes:
  mysql_data:
  go-mod-cache:
  go-build-cache:

networks:
  mcp-network:
    driver: bridge
