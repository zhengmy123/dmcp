services:
  mcp-server:
    image: golang:1.25-alpine
    container_name: mcp-server
    restart: unless-stopped
    working_dir: /app
    ports:
      - "17050:18080"
    environment:
      MYSQL_DSN: "root:1234qwer@tcp(host.docker.internal:3306)/mcp_server?charset=utf8mb4&parseTime=True&loc=Local"
      HTTP_MYSQL_DSN: "root:1234qwer@tcp(host.docker.internal:3306)/mcp_server?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "host.docker.internal:6379"
      TOOL_STORE: "mysql"
      HTTP_SERVICE_STORE: "mysql"
      ADMIN_TOKEN: "admin-secret-token"
      REFRESH_SECONDS: 10
      HTTP_SYNC_INTERVAL: 60
      GOCACHE: /go-build-cache
      GOMODCACHE: /go-mod-cache
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - .:/app
      - ./logs:/app/logs
      - go-mod-cache:/go-mod-cache
      - go-build-cache:/go-build-cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tty: true
    stdin_open: true
    command: sh -c "echo '[mcp-server] Downloading dependencies...' && go mod download && echo '[mcp-server] Building server...' && go build -o mcp-server ./cmd/server && echo '[mcp-server] Starting server...' && ./mcp-server"
    networks:
      - mcp-network

  web:
    image: nginx:alpine
    container_name: mcp-web
    restart: unless-stopped
    ports:
      - "17000:80"
    volumes:
      - ./web/admin/dist:/usr/share/nginx/html:ro
      - ./web/admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/admin/public/config.json:/usr/share/nginx/html/config.json:ro
    networks:
      - mcp-network

volumes:
  go-mod-cache:
  go-build-cache:

networks:
  mcp-network:
    driver: bridge
